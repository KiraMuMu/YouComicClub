<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线下活动 · 悠行动漫社</title>
  <link rel="icon" href="../assets/images/club-logo.png" type="image/png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme.js"></script>
  <script src="../data/activities.js"></script>
  <style>
    .page-hero {
      padding: 60px 24px 40px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .page-hero-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 50px;
      background: rgba(91,212,155,0.12);
      border: 1px solid rgba(91,212,155,0.25);
      color: #7fffca;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, #a8d5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .page-desc { color: var(--text-muted); max-width: 480px; margin: 0 auto; }

    .content-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
      z-index: 10;
    }

    /* 活动卡片 */
    .activity-list { display: flex; flex-direction: column; gap: 32px; }

    .activity-card {
      border-radius: var(--radius);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      overflow: hidden;
      transition: var(--transition);
    }

    .activity-card:hover {
      border-color: rgba(91,143,212,0.4);
      box-shadow: 0 16px 50px rgba(0,10,50,0.5);
    }

    .activity-inner {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 240px;
    }

    /* 左侧：海报区 */
    .activity-poster {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(20,50,120,0.5), rgba(50,20,100,0.3));
    }

    .activity-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .activity-card:hover .activity-poster img { transform: scale(1.04); }

    .activity-poster-placeholder {
      width: 100%;
      height: 100%;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
      font-size: 0.85rem;
    }

    .activity-poster-placeholder span:first-child { font-size: 3rem; }

    .activity-category-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 12px;
      background: rgba(10,20,60,0.85);
      border: 1px solid rgba(91,143,212,0.3);
      border-radius: 50px;
      font-size: 0.75rem;
      color: var(--accent-2);
      backdrop-filter: blur(8px);
    }

    /* 右侧：文字信息 */
    .activity-info {
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .activity-date {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activity-tags { display: flex; gap: 8px; flex-wrap: wrap; }

    .activity-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .activity-desc {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.8;
      flex: 1;
    }

    /* 照片缩略图 */
    .photo-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .photo-thumb:hover {
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .photo-more {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      background: rgba(91,143,212,0.12);
      border: 1px dashed rgba(91,143,212,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
    }

    /* 灯箱 */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      object-fit: contain;
    }

    .lightbox-caption {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      transition: var(--transition);
      line-height: 1;
    }

    .lightbox-close:hover { color: #fff; }

    /* 新增活动提示 */
    .add-activity-hint {
      margin-top: 40px;
      padding: 24px;
      border: 1px dashed rgba(91,143,212,0.25);
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.8;
    }

    .add-activity-hint code {
      background: rgba(91,143,212,0.12);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      color: var(--accent-2);
      font-size: 0.85rem;
    }

    @media (max-width: 860px) {
      .activity-inner { grid-template-columns: 1fr; }
      .activity-poster { min-height: 220px; }
      .activity-info { padding: 24px; }
      .activity-title { font-size: 1.25rem; }
    }

    @media (max-width: 500px) {
      .content-area { padding-left: 16px; padding-right: 16px; }
      .photo-thumb, .photo-more { width: 60px; height: 60px; }
    }

    /* 导航栏登录 */
    .nav-auth {
      position: relative;
    }
    .btn-sm {
      padding: 8px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="bg-stars" aria-hidden="true"></div>

<nav class="nav">
  <a class="nav-logo" href="../index.html">
    <img src="../assets/images/club-logo.png" alt="悠行动漫社">
    <span>悠行动漫社</span>
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="../index.html">首页</a></li>
    <li><a href="about.html">社团介绍</a></li>
    <li><a href="magazine.html">社刊</a></li>
    <li><a href="activities.html" class="active">线下活动</a></li>
    <li><a href="anime-schedule.html">季番时间表</a></li>
    <li><button class="theme-toggle" id="themeToggle" aria-label="切换主题">
      <span class="icon-moon">🌙</span><span class="icon-sun">☀️</span>
    </button></li>
    <li class="nav-auth">
      <button id="auth-login-btn" class="btn btn-sm btn-primary">登录</button>
      <div id="auth-user-info" class="auth-user-info" style="display:none;">
        <img id="auth-avatar" class="auth-avatar" src="" alt="头像">
        <span id="auth-username" class="auth-username"></span>
        <div class="auth-dropdown">
          <div class="auth-dropdown-item" onclick="location.href='profile.html'">个人中心</div>
          <div class="auth-dropdown-item" id="auth-logout-btn">退出登录</div>
        </div>
      </div>
    </li>
  </ul>
</nav>

<div class="page-wrapper">
  <div class="page-hero">
    <div class="page-hero-tag">ACTIVITIES</div>
    <h1 class="page-title">线下活动</h1>
    <p class="page-desc">每一次相聚都值得被记录，每一段回忆都不该被遗忘</p>
  </div>

  <div class="content-area">
    <div class="activity-list" id="activityList">
      <!-- JS渲染 -->
    </div>

    <div class="add-activity-hint">
      📌 新增活动记录：编辑 <code>data/activities.js</code> 文件，在数组末尾添加新活动数据即可
    </div>
  </div>
</div>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<footer class="footer">
  <p>© 2025–2026 悠行动漫社官方网站 &nbsp;|&nbsp; 感谢访问!</p>
  <p style="margin-top: 6px;">由 橙の慕丶 建立&维护，由 Cloudflare 提供支持</p>
</footer>

<!-- 账号系统 -->
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/auth-modal.js"></script>

<script>
  // 导航
  const toggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');
  toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

  // 渲染活动列表
  const list = document.getElementById('activityList');

  ACTIVITIES_DATA.forEach((act, idx) => {
    const card = document.createElement('div');
    card.className = 'activity-card fade-in';
    card.style.animationDelay = `${idx * 0.1}s`;

    const posterHtml = act.poster
      ? `<img src="${act.poster}" alt="${act.title}海报" loading="lazy" onerror="this.parentElement.innerHTML='<div class=activity-poster-placeholder><span>🎉</span><span>海报待上传</span></div>'">`
      : `<div class="activity-poster-placeholder"><span>🎉</span><span>海报待上传</span></div>`;

    const tagsHtml = act.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // 照片缩略图（最多显示4张）
    let photosHtml = '';
    if (act.photos && act.photos.length > 0) {
      const show = act.photos.slice(0, 4);
      photosHtml = `<div class="photo-strip">
        ${show.map(p => `<img class="photo-thumb" src="${p.src}" alt="${p.caption}" title="${p.caption}" loading="lazy"
          onerror="this.style.display='none'"
          onclick="openLightbox('${p.src}','${p.caption}')">`).join('')}
        ${act.photos.length > 4 ? `<div class="photo-more" onclick="openLightbox('${act.photos[4].src}','${act.photos[4].caption}')">+${act.photos.length - 4}<br>更多</div>` : ''}
      </div>`;
    }

    card.innerHTML = `
      <div class="activity-inner">
        <div class="activity-poster">
          ${posterHtml}
          <span class="activity-category-badge">${act.category}</span>
        </div>
        <div class="activity-info">
          <div class="activity-meta">
            <div class="activity-date">📅 ${act.date}</div>
            <div class="activity-tags">${tagsHtml}</div>
          </div>
          <div class="activity-title">${act.title}</div>
          <div class="activity-desc">${act.description}</div>
          ${photosHtml}
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // 灯箱
  function openLightbox(src, caption) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxCaption').textContent = caption;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // 滚动动画
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.fade-in').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(24px)';
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    observer.observe(el);
  });
</script>
</body>
</html>
