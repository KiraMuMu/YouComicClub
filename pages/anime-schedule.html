<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>季番时间表 · 悠行动漫社</title>
  <link rel="icon" href="../assets/images/club-logo.png" type="image/png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme.js"></script>
  <style>
    .content-area {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px 80px;
      position: relative;
      z-index: 10;
    }

    /* 加载状态 */
    .loading-container {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(91,143,212,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 错误状态 */
    .error-container {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid var(--primary);
      background: rgba(91,143,212,0.1);
      color: var(--text-main);
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* 筛选栏 */
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 16px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(91,143,212,0.2);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--primary); }

    .filter-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(91,143,212,0.2);
      background: rgba(91,143,212,0.08);
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .filter-btn:hover, .filter-btn.active {
      background: rgba(91,143,212,0.2);
      border-color: rgba(91,143,212,0.5);
      color: var(--text-main);
    }

    .result-count {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* 星期分组 */
    .day-section { margin-bottom: 32px; }

    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 18px;
      background: rgba(91,143,212,0.08);
      border-left: 4px solid var(--primary);
      border-radius: 0 10px 10px 0;
    }

    .day-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .day-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(91,143,212,0.12);
      padding: 3px 12px;
      border-radius: 50px;
    }

    /* 番剧网格 */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    @media (min-width: 768px) {
      .anime-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    /* 番剧卡片 */
    .anime-card {
      border-radius: 12px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .anime-card:hover {
      transform: translateY(-4px);
      border-color: rgba(91,143,212,0.4);
      box-shadow: 0 12px 40px rgba(0,10,50,0.4);
    }

    /* 封面图 */
    .anime-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: rgba(91,143,212,0.06);
    }

    .anime-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      transition: transform 0.4s ease, opacity 0.3s ease;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .anime-card:hover .anime-cover img {
      transform: scale(1.05);
    }

    /* 评分角标 */
    .anime-score {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      color: #FFD700;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 追番按钮 */
    .watch-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .watch-btn:hover {
      background: rgba(255, 155, 122, 0.7);
      transform: scale(1.1);
    }

    .watch-btn.watching {
      background: rgba(255, 155, 122, 0.9);
      color: #fff;
    }

    /* 集数标签 */
    .anime-ep {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 0.72rem;
      color: #fff;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* 卡片信息区 */
    .anime-info {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .anime-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .anime-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .anime-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }

    .anime-tag {
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(91,143,212,0.1);
      color: rgba(168,213,255,0.9);
      border: 1px solid rgba(91,143,212,0.15);
    }

    /* 详情模态框 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }

    .modal-overlay.open .modal-box {
      transform: scale(1);

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
    }

    .detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .detail-cover {
      width: 160px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .detail-cover img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .detail-meta {
      flex: 1;
      min-width: 0;
    }

    .detail-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .detail-score {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      color: #FFD700;
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .detail-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-height: 120px;
      overflow-y: auto;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid rgba(91,143,212,0.1);
      font-size: 0.9rem;

    .detail-row .label { color: var(--accent-2); min-width: 60px; font-weight: 600; flex-shrink: 0; }
    .detail-row .value { color: var(--text-muted); }

    .detail-actions {

      gap: 12px;
      margin-top: 16px;
    }

    .detail-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .detail-btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
    }

    .detail-btn-secondary {
      background: rgba(91,143,212,0.1);
      color: var(--text-muted);
      border: 1px solid rgba(91,143,212,0.3);

    /* 追番按钮 */

      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .track-btn:hover {
      background: rgba(91,143,212,0.1);
    }
    .track-btn.tracked {
      background: var(--primary);
      color: white;
    }
    .track-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 导航栏登录 */
    .nav-auth {

      font-size: 14px;
    }

    @media (max-width: 600px) {
      .detail-header { flex-direction: column; align-items: center; text-align: center; }
      .detail-cover { width: 160px; }
      .detail-actions { flex-direction: column; }
      .anime-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
  </style>
</head>

<script>
  // ========== 图片预加载器 ==========
  const ImageLoader = {
    cache: new Map(),

    // 预加载单张图片，返回 Promise
    preload(url) {
      if (!url || this.cache.has(url)) return Promise.resolve(url);
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          this.cache.set(url, true);
          resolve(url);
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    },

    // 渐进式加载：先显示占位图，大图加载完成后替换
    progressiveLoad(imgElement, finalUrl) {
      if (!imgElement || !finalUrl) return;
      this.preload(finalUrl).then(() => {
        if (!imgElement) return;
        imgElement.style.opacity = '0.3';
        setTimeout(() => {
          imgElement.src = finalUrl;
          imgElement.style.opacity = '1';
        }, 80);
      });
    }
  };

  // ========== Bangumi API ==========
  const BangumiAPI = {
    BASE: 'https://api.bgm.tv',

    async fetchWithFallback(url) {
      // 尝试直连
      try {
        const res = await fetch(url, { headers: { 'User-Agent': 'YouComicClub/1.0' } });
        if (res.ok) return res;
      } catch {}
      // 如果直连失败，尝试用公共 CORS 代理
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const res2 = await fetch(proxyUrl);
      if (!res2.ok) throw new Error(`HTTP ${res2.status}`);
      return res2;
    },

    async getCalendar() {
      const res = await this.fetchWithFallback(`${this.BASE}/calendar`);
      return await res.json();
    }
  };

  // ========== 追番列表 ==========
  const WatchList = {
    KEY: 'youcomic-watchlist',

    getAll() {
      try { return JSON.parse(localStorage.getItem(this.KEY)) || {}; }
      catch { return {}; }
    },

    save(data) { localStorage.setItem(this.KEY, JSON.stringify(data)); },

    toggle(id, title) {
      const list = this.getAll();
      if (list[id]) { delete list[id]; }
      else { list[id] = { title, addedAt: new Date().toISOString() }; }
      this.save(list);
      return !!list[id];
    },

    isWatching(id) { return !!this.getAll()[id]; }
  };

  // ========== 全局状态 ==========
  let allAnimes = [];
  let currentFilter = 'all';
  let currentSearch = '';

  const DAY_NAMES = { 1:'周一', 2:'周二', 3:'周三', 4:'周四', 5:'周五', 6:'周六', 7:'周日' };
  const DAY_COLORS = { 1:'#5B8FD4', 2:'#7E6FD8', 3:'#5BB8C4', 4:'#5BC48B', 5:'#C4A85B', 6:'#D4785B', 7:'#C45B8B' };

  // ========== 工具函数 ==========
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 获取最佳图片 URL
  function getImageUrl(images, size) {
    if (!images) return null;
    const prefer = size === 'large' ? ['large','common','medium','small'] : ['medium','small','common','large'];
    for (const k of prefer) { if (images[k]) return images[k]; }
    return null;
  }

  // ========== 加载数据 ==========
  async function loadBangumiData() {
    const loadingEl = document.getElementById('loadingContainer');
    const errorEl = document.getElementById('errorContainer');
    const mainEl = document.getElementById('mainContent');

    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';
    mainEl.style.display = 'none';

    try {
      const calendar = await BangumiAPI.getCalendar();

      allAnimes = [];
      (calendar.data || calendar).forEach(dayData => {
        const weekday = dayData.weekday?.id || dayData.weekday;
        const items = dayData.items || [];
        items.forEach(item => {
          allAnimes.push({
            id: item.id,
            name: item.name,
            name_cn: item.name_cn || item.name,
            images: item.images,
            rating: item.rating,
            air_date: item.air_date || item.date,
            eps: item.eps || item.total_episodes,
            weekday: weekday,
            summary: item.summary || item.short_summary || '',
            tags: (item.tags || []).slice(0, 5).map(t => t.name || t)
          });
        });
      });

      document.getElementById('totalCount').textContent = allAnimes.length;
      document.getElementById('seasonInfo').textContent = getCurrentSeason();

      loadingEl.style.display = 'none';
      mainEl.style.display = 'block';

      render();
    } catch (err) {
      console.error('[Bangumi] 加载失败:', err);
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      document.getElementById('errorText').textContent = `加载失败: ${err.message}`;
    }
  }

  function getCurrentSeason() {
    const d = new Date();
    const m = d.getMonth() + 1;
    const s = m <= 3 ? '冬季' : m <= 6 ? '春季' : m <= 9 ? '夏季' : '秋季';
    return `${d.getFullYear()}年${s}`;
  }

  // ========== 渲染 ==========
  function render() {
    const container = document.getElementById('animeContainer');
    const noResult = document.getElementById('noResult');

    let filtered = allAnimes.filter(anime => {
      const dayOk = currentFilter === 'all' || anime.weekday === parseInt(currentFilter);
      const q = currentSearch.trim().toLowerCase();
      const searchOk = !q ||
        anime.name.toLowerCase().includes(q) ||
        (anime.name_cn && anime.name_cn.toLowerCase().includes(q)) ||
        anime.tags.some(t => t.toLowerCase().includes(q));
      return dayOk && searchOk;
    });

    document.getElementById('resultCount').textContent = `共 ${filtered.length} 部`;

    if (filtered.length === 0) {
      container.innerHTML = '';
      noResult.style.display = 'block';
      return;
    }
    noResult.style.display = 'none';

    // 按星期分组
    const grouped = {};
    const dayOrder = [1,2,3,4,5,6,7];
    filtered.forEach(anime => {
      const d = anime.weekday || 1;
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(anime);
    });

    container.innerHTML = '';
    dayOrder.forEach(day => {
      if (!grouped[day] || grouped[day].length === 0) return;

      const section = document.createElement('div');
      section.className = 'day-section';
      section.innerHTML = `
        <div class="day-header" style="border-left-color:${DAY_COLORS[day]}">
          <span class="day-name" style="color:${DAY_COLORS[day]}">${DAY_NAMES[day]}</span>
          <span class="day-count">${grouped[day].length} 部</span>
        </div>
        <div class="anime-grid" id="grid-${day}"></div>
      `;
      container.appendChild(section);

      const grid = section.querySelector('.anime-grid');
      grouped[day].forEach(anime => {
        grid.appendChild(createAnimeCard(anime));
      });
    });
  }

  // 创建卡片（渐进式图片加载）
  function createAnimeCard(anime) {
    const card = document.createElement('div');
    card.className = 'anime-card';

    const isWatching = WatchList.isWatching(anime.id);
    const largeUrl = getImageUrl(anime.images, 'large');
    const smallUrl = getImageUrl(anime.images, 'medium') || largeUrl;
    const score = anime.rating?.score;

    // 封面：先显示小图，大图加载完替换
    let coverHtml = '';
    if (smallUrl) {
      const imgId = `img_${anime.id}`;
      coverHtml = `
        <div class="anime-cover">
          <img id="${imgId}" src="${smallUrl}" alt="${escapeHtml(anime.name_cn)}" loading="lazy">
          ${score ? `<div class="anime-score">★ ${score.toFixed(1)}</div>` : ''}
          <button class="watch-btn ${isWatching ? 'watching' : ''}"
                  onclick="event.stopPropagation(); toggleWatch(${anime.id}, '${escapeHtml(anime.name_cn).replace(/'/g, "\\'")}', this)">
            ${isWatching ? '❤️' : '🤍'}
          </button>
          ${anime.eps ? `<div class="anime-ep">${anime.eps}集</div>` : ''}
        </div>
      `;
      // 预加载大图
      if (largeUrl && largeUrl !== smallUrl) {
        setTimeout(() => {
          const imgEl = document.getElementById(imgId);
          if (imgEl) ImageLoader.progressiveLoad(imgEl, largeUrl);
        }, 200);
      }
    } else {
      coverHtml = `
        <div class="anime-cover" style="display:flex;align-items:center;justify-content:center;background:rgba(91,143,212,0.1)">
          <span style="font-size:3rem;opacity:0.3">📺</span>
          <button class="watch-btn ${isWatching ? 'watching' : ''}"
                  onclick="event.stopPropagation(); toggleWatch(${anime.id}, '${escapeHtml(anime.name_cn).replace(/'/g, "\\'")}', this)">
            ${isWatching ? '❤️' : '🤍'}
          </button>
        </div>
      `;
    }

    const tagsHtml = anime.tags.slice(0, 3).map(t =>
      `<span class="anime-tag">${escapeHtml(t)}</span>`
    ).join('');

    card.innerHTML = `
      ${coverHtml}
      <div class="anime-info">
        <div class="anime-title">${escapeHtml(anime.name_cn)}</div>
        <div class="anime-meta">${anime.air_date || '待定'} 开播</div>
        <div class="anime-tags">${tagsHtml}</div>
      </div>
    `;

    card.addEventListener('click', () => openDetail(anime));
    return card;
  }

  // 追番切换
  function toggleWatch(id, title, btn) {
    const isWatching = WatchList.toggle(id, title);
    btn.classList.toggle('watching', isWatching);
    btn.textContent = isWatching ? '❤️' : '🤍';
  }

  // 打开详情
  function openDetail(anime) {
    const isWatching = WatchList.isWatching(anime.id);
    const largeUrl = getImageUrl(anime.images, 'large');

    const coverHtml = largeUrl
      ? `<div class="detail-cover"><img src="${largeUrl}" alt="${escapeHtml(anime.name_cn)}"></div>`
      : `<div class="detail-cover" style="display:flex;align-items:center;justify-content:center;background:rgba(91,143,212,0.1);aspect-ratio:3/4"><span style="font-size:3rem;opacity:0.3">📺</span></div>`;

    const scoreHtml = anime.rating?.score
      ? `<div class="detail-score">★ ${anime.rating.score.toFixed(1)} <small>(${(anime.rating.total || 0).toLocaleString()}人评价)</small></div>`
      : '';

    const tagsHtml = anime.tags.map(t => `<span class="anime-tag">${escapeHtml(t)}</span>`).join('');

    document.getElementById('modalBody').innerHTML = `
      <div class="detail-header">
        ${coverHtml}
        <div class="detail-meta">
          <div class="detail-title">${escapeHtml(anime.name_cn)}</div>
          <div style="color:var(--text-muted);font-size:0.85rem;margin-bottom:8px">${escapeHtml(anime.name)}</div>
          ${scoreHtml}
          <div class="detail-summary">${escapeHtml(anime.summary || '暂无简介')}</div>
        </div>
      </div>
      <div class="detail-row">
        <span class="label">放送</span>
        <span class="value">${DAY_NAMES[anime.weekday] || '待定'} ${anime.air_date || ''}</span>
      </div>
      <div class="detail-row">
        <span class="label">集数</span>
        <span class="value">${anime.eps || '未定'}</span>
      </div>
      <div class="detail-row">
        <span class="label">标签</span>
        <span class="value" style="display:flex;flex-wrap:wrap;gap:4px">${tagsHtml || '无'}</span>
      </div>
      <div class="detail-actions">
        <button class="detail-btn detail-btn-primary" onclick="toggleWatchFromModal(${anime.id}, '${escapeHtml(anime.name_cn).replace(/'/g, "\\'")}')">
          ${isWatching ? '❤️ 已在看' : '🤍 标记在看'}
        </button>
        <a class="detail-btn detail-btn-secondary" href="https://bgm.tv/subject/${anime.id}" target="_blank" rel="noopener">
          🔗 Bangumi 页面
        </a>
      </div>
    `;

    document.getElementById('animeModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function toggleWatchFromModal(id, title) {
    WatchList.toggle(id, title);
    const anime = allAnimes.find(a => a.id === id);
    if (anime) openDetail(anime);
    render();
  }

  function closeModal() {
    document.getElementById('animeModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ========== 事件绑定 ==========
  document.getElementById('navToggle').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
  });

  document.getElementById('filterBtns').addEventListener('click', e => {
    if (e.target.classList.contains('filter-btn')) {
      currentFilter = e.target.dataset.day;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.day === currentFilter);
      });
      render();
    }
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  document.getElementById('animeModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ========== 初始化 ==========
  loadBangumiData();
</script>
</body>
</html>
